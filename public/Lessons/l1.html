<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic 1 - Lesson 1</title>
    <link rel="icon" type="image/png" href="../Images/favicon.png">
    <link rel="stylesheet" href="lessonTheme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
    <div id="hud">
        <a id="exitbtn"><span class="material-symbols-outlined exitBtn">close</span></a>
        <div class="progressBarContainer">
            <div id="progressBar">
            </div>
        </div>
    </div>
    <main>
        <br>
        <div class="choose_picture lessonSection">
            Pick the correct picture: <br>
            <div class="questionData">
                <span class="material-symbols-outlined soundBtn">volume_up</span>
                <div id="question1"></div>
            </div>
            <div class="options">
                <img type="image/png" alt="" class="imgs option1" id="img1">
                <img type="image/png" alt="" class="imgs option2" id="img2"><br>
                <img type="image/png" alt="" class="imgs option3" id="img3">
                <img type="image/png" alt="" class="imgs option4" id="img4">
            </div>
        </div>

        <div class="choose_heard_word lessonSection">
            Pick the word that you hear <br>
            <div class="questionData">
                <span class="material-symbols-outlined soundBtn">volume_up</span>
                <div id="question2"></div>
            </div>
            <div class="options">
                <div class="heardWords option1" id="heardWord1">Word 1</div><br>
                <div class="heardWords option2" id="heardWord2">Word 2</div><br>
                <div class="heardWords option3" id="heardWord3">Word 3</div><br>
                <div class="heardWords option4" id="heardWord4">Word 4</div>
            </div>
        </div>

        <div class="writeWord lessonSection">
            Translate into <span class="Qlanguage"></span> <br>
            <div class="questionData">
                <span class="material-symbols-outlined soundBtn">volume_up </span>
                <div id="question3"></div>
            </div>
            <div class="wordToType"></div>
            <input class="typedWord" type="text" autocomplete="off">
        </div>

        <div id="lessonOverlay"></div>
        <button class="checkBtn">Check</button>


        <div class="lesson_end lessonSection">
            end of lesson
            <div id="funFact"></div>
            <div id="lessonTime"></div>
            <table id="questionMarks">
                <caption>Question Results:</caption>
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <button id="endLessonBtn">Finish</button>
        </div>
    </main>
    <div class="resultBox">
        <div id="results">
            <div id="messages">
                <div id="messageBox"></div>
                <div id="answerMessage"></div>
            </div>
            <div id="userFeedbackBox">
                <button id="goodProficiencyBtn" class="feedbackBtn"><span class="material-symbols-outlined">
                        sentiment_satisfied
                    </span></button>
                <button id="neutralProficiencyBtn" class="feedbackBtn"><span class="material-symbols-outlined">
                        sentiment_neutral
                    </span></button>
                <button id="badProficiencyBtn" class="feedbackBtn"><span class="material-symbols-outlined">
                        sentiment_dissatisfied
                    </span></button>
            </div>
        </div>
        <br><br><br>
        <button id="nextSectionBtn">Next</button>
    </div>
    <div id="cancelLessonBox">
        Are you sure you want to to leave the lesson?<br>
        <button id="cancelBtn">No</button><br>
        <button id="quitLessonBtn">Yes</button>
    </div>

    <script type="module"> import damerauLevenshtein from 'https://cdn.jsdelivr.net/npm/damerau-levenshtein@1.0.8/+esm'; window.levenshtein = damerauLevenshtein; </script>
    <script src="lessonFunctions.js" type="module"></script>
    <script src="l1.js" type="module"></script>

</body>

</html>
